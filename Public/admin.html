<!DOCTYPE html>
<htm lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL MAESTRO - SUPERPOTE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
    body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    #login-admin { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h2 { margin-top: 0; color: #38bdf8; }
    input { width: 100%; padding: 12px; margin: 15px 0; background: #020617; border: 1px solid #475569; border-radius: 8px; color: white; text-align: center; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #22c55e; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #16a34a; }
    .panel { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
</style>
</head>
<body>
    <h1>🛡️ PANEL MAESTRO</h1>
    
    <div id="login-admin">
    <h2>🔐 ACCESO MAESTRO</h2>
    <input type="password" id="pass-admin" placeholder="••••••">
    <button onclick="verificarAcceso()">INGRESAR</button>
</div>

    <div id="contenido-admin" style="display:none;">
        <div class="panel">
            <h3>⚙️ CONTROL DE RULETA</h3>
            <select id="select-ganador">
                <script>
                    const elementosSorteo = ["Limón", "Coco", "Manzana", "Pera", "Cereza", "Durazno", "Kiwi", "Ciruela", "Mora", "Aguacate", "Perro", "Gato", "León", "Tigre", "Mono", "Oso", "Zorro", "Lobo", "Águila", "Loro", "Delfín", "Culebra", "Sapo", "Pez", "Toro", "Vaca", "Caballo", "Oveja", "Gallo", "Fresa"];
                    elementosSorteo.forEach((item, i) => document.write(`<option value="${i}">${item}</option>`));
                </script>
            </select>
            <button onclick="forzarGiro(true)">GIRO DIRIGIDO</button>
            <button onclick="forzarGiro(false)" style="background:#f59e0b; margin-top: 10px;">GIRO ALEATORIO</button>
        </div>

        <div class="panel">
            <h3>📊 ESTADÍSTICAS EN TIEMPO REAL</h3>
            <p>Pote Actual: <b id="admin-pote">0</b> Bs</p>
            <p>Comisión Casa: <b id="display-comision">0.00</b> Bs</p>
            <p>Usuarios en línea: <b id="display-usuarios">0</b></p>
        </div>

        <div class="panel">
            <h3>📥 SOLICITUDES PENDIENTES</h3>
            <div id="lista-solicitudes"></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://superpote-e3dc4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    function verificarAcceso() {
        if(document.getElementById('pass-admin').value === "R0b3rt0206#") {
            document.getElementById('login-admin').style.display = 'none';
            document.getElementById('contenido-admin').style.display = 'block';
            cargarDatos();
        } else { alert("Acceso Denegado"); }
    }

  function cargarDatos() {
        rtdb.ref('sistema/global/pote').on('value', s => {
            document.getElementById('admin-pote').innerText = s.val() || 0;
        });
        
        // --- REEMPLAZO AQUÍ ---
        rtdb.ref('sistema/usuarios').on('value', (snap) => {
            let conectados = 0;
            snap.forEach((child) => {
                // Solo cuenta si el estado 'online' es true
                if (child.val().online === true) {
                    conectados++;
                }
            });
            console.log("DEBUG: Usuarios activos encontrados:", conectados);
            document.getElementById('display-usuarios').innerText = conectados;
        });
        // ----------------------

        rtdb.ref('sistema/global/bovedaCasa').on('value', (snap) => {
            document.getElementById('display-comision').innerText = (snap.val() || 0).toFixed(2) + " Bs";
        });
        
        document.getElementById('lista-solicitudes').innerHTML = "";
        
        rtdb.ref('sistema/solicitudesDeposito').on('child_added', snap => {
            let data = snap.val();
            let div = document.createElement('div');
            div.id = `sol-${snap.key}`;
            let color = data.tipo === 'RETIRAR' ? '#ef4444' : '#22c55e';
            
            div.innerHTML = `
                <div style="border:1px solid ${color}; padding:10px; margin:5px 0; border-radius:8px;">
                    <p style="margin:0;"><b>${data.tipo}</b> | Usuario: ${data.nombre}</p>
                    <p style="margin:0;"><b>Cédula:</b> ${data.cedula} | <b>Tel:</b> ${data.telefono}</p>
                    <p style="margin:0;"><b>Monto:</b> ${data.monto} Bs | <b>Ref:</b> ${data.referencia}</p>
                    <div style="margin-top:10px;">
                        <button onclick="aprobar('${snap.key}', ${data.monto}, '${data.usuarioId}', '${data.tipo}')" style="background:#22c55e;">PROCESAR</button>
                        <button onclick="rechazar('${snap.key}', ${data.monto}, '${data.usuarioId}', '${data.tipo}')" style="background:#ef4444; margin-top:5px;">RECHAZAR</button>
                    </div>
                </div>
            `;
            document.getElementById('lista-solicitudes').appendChild(div);
        });
    }

    function rechazar(key, monto, uid, tipo) {
        if (tipo === 'RETIRAR') {
            rtdb.ref(`sistema/usuarios/${uid}/saldo`).transaction(s => (s || 0) + monto);
        }
        rtdb.ref(`sistema/solicitudesDeposito/${key}`).remove();
        document.getElementById(`sol-${key}`).remove();
        alert("❌ Solicitud rechazada correctamente.");
    }

    function aprobar(key, monto, uid, tipo) {
        if (tipo === 'DEPOSITAR') {
            rtdb.ref(`sistema/usuarios/${uid}/saldo`).transaction(s => (s || 0) + monto);
            alert("✅ Depósito acreditado.");
        } else {
            alert("✅ Retiro procesado.");
        }
        rtdb.ref(`sistema/solicitudesDeposito/${key}`).remove();
        document.getElementById(`sol-${key}`).remove();
    }

    function forzarGiro(manual) {
        let indice = manual ? document.getElementById('select-ganador').value : Math.floor(Math.random()*30);
        rtdb.ref('sistema/global/comandoGiro').set({ estado: "girando", indiceGanador: parseInt(indice) });
        alert("Orden enviada.");
    }
</script>
</body>
</html>
