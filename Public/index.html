<script>
    const socket = io();
    
    // --- MUEVE ESTAS FUNCIONES AQUÍ, AL NIVEL GLOBAL ---
    window.deshacerUltimoMovimiento = async function() {
        console.log("DEBUG: Contenido de apuestasRealizadas:", apuestasRealizadas);
        if (Object.keys(apuestasRealizadas).length === 0) return alert("⚠️ No hay apuestas que deshacer.");
        try {
            const response = await fetch('/deshacer-apuesta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: usuarioActualId, apuestas: apuestasRealizadas })
            });
            const data = await response.json();
            if (data.success) {
                apuestasRealizadas = {};
                alert("✅ Apuestas devueltas.");
            } else {
                alert("❌ Error: " + data.message);
            }
        } catch (e) { alert("❌ Error de conexión."); }
    };

    window.repetirUltimaJugadaMesa = function() {
        if (!ultimaApuestaGuardada || Object.keys(ultimaApuestaGuardada).length === 0) return alert("⚠️ No hay apuesta previa.");
        Object.entries(ultimaApuestaGuardada).forEach(([figura, monto]) => {
            fichaSeleccionada = monto;
            realizarApuestaDefinitiva(figura);
        });
    };

    // Configuración base
    const firebaseConfig = { databaseURL: "https://superpote-e3dc4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    
    let fichaSeleccionada = 0;


// --- ESCUCHAS SOCKET ---
    socket.on('tiempo-actualizado', (segundos) => {
        const elReloj = document.getElementById('reloj-apuestas');
        const banner = document.getElementById('banner-estado-mesa');
        if (elReloj) elReloj.innerText = "Tiempo para apostar: " + segundos + "s";
        
        if (segundos <= 5) {
            banner.innerText = "🚫 ¡APUESTAS CERRADAS!";
            document.querySelectorAll('.btn-apuesta').forEach(b => b.disabled = true);
        } else {
            banner.innerText = "🎰 APUESTA AHORA";
            document.querySelectorAll('.btn-apuesta').forEach(b => b.disabled = false);
        }

        // Cuando el tiempo vuelve a 30, limpiamos
        if (segundos === 30) {
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('btn-activo'));
            document.querySelectorAll('[id^="apuesta-"]').forEach(el => el.innerText = "0 Bs");
        }
    });
       socket.on('estado-juego', (estado) => {
        const bannerEstado = document.getElementById('banner-estado-mesa');
        const popup = document.getElementById('centro-popup');
        if (estado === 'apuestas') {
            popup.classList.remove('mostrar');
            bannerEstado.innerText = "🎰 APUESTA AHORA";
        } else if (estado === 'girando') {
            bannerEstado.innerText = "🔊 ¡RUEDAN LOS TAMBORES!";
            document.querySelectorAll('.btn-apuesta').forEach(b => b.disabled = true);
        }
    }); // <--- AQUÍ SE CIERRA EL ESTADO DE JUEGO

    socket.on('connect', () => {
        console.log("✅ Conectado al servidor con ID:", socket.id);
    });

    socket.on('connect_error', (err) => {
        console.log("❌ Error de conexión:", err.message);
    });

    // Variables globales
    let usuarioActualId = "";
    let datosUsuarioGlobales = {};
    let valorFichaSeleccionada = 0;
    let apuestasRealizadas = {};
    let ultimaApuestaGuardada = {};
    let modoActualAuth = "LOGIN";
    let captchaResultadoCorrecto = 0;
    let historialApuestas = []; // Aquí guardaremos cada clic que el usuario haga
    let apuestaActual = {};     // Lo que el usuario lleva en la ronda actual
    const elementosSorteo = [
        "Limón", "Coco", "Manzana", "Pera", "Cereza", "Durazno", "Kiwi", "Ciruela", "Mora", "Aguacate",
        "Perro", "Gato", "León", "Tigre", "Mono", "Oso", "Zorro", "Lobo", "Águila", "Loro",
        "Delfín", "Culebra", "Sapo", "Pez", "Toro", "Vaca", "Caballo", "Oveja", "Gallo", "Fresa"
    ];
        const coloresRuletaOriginal = ["#0f172a", "#1e293b", "#020617", "#ffaa00", "#111827", "#334155"];

        // Generar Captcha al iniciar
        function refrescarCaptcha() {
        let num1 = Math.floor(Math.random() * 9) + 1;
        let num2 = Math.floor(Math.random() * 9) + 1;
        captchaResultadoCorrecto = num1 + num2;
        document.getElementById('texto-captcha').innerText = `🔒 SEGURIDAD: ¿Cuánto es ${num1} + ${num2}?`;
    }
    
    // Inicializar
    refrescarCaptcha();

        // Generar botones de apuesta correctamente
const grid = document.getElementById('contenedor-botones-apuestas');
elementosSorteo.forEach(item => {
    let btn = document.createElement('button');
    btn.className = 'btn-apuesta';
    btn.id = `btn-${item}`;
    btn.innerHTML = `${item}<span id="apuesta-${item}">0 Bs</span>`;
    btn.onclick = () => realizarApuestaDefinitiva(item);
    grid.appendChild(btn);
});
// --- CORRECCIÓN CRÍTICA DE SINCRONIZACIÓN ---
socket.on('connect', () => {
    // Al conectar, preguntamos al servidor en qué estado estamos
    firebase.database().ref('sistema/global/estadoJuego').once('value', (snap) => {
        const estado = snap.val();
        if (estado === 'apuestas') {
            document.getElementById('centro-popup').classList.remove('mostrar');
            document.getElementById('banner-estado-mesa').innerText = "🎰 APUESTA AHORA";
        }
    }); // <--- Cierre de la función de firebase
}); // <--- Cierre de la función socket.on('connect')

// Estas funciones deben ir FUERA de la función 'connect' para que sean escuchas independientes
socket.on('limpiar-interfaz', () => {
    document.getElementById('centro-popup').classList.remove('mostrar');
    document.querySelectorAll('[id^="apuesta-"]').forEach(el => el.innerText = "0 Bs");
}); 

// Escuchar cuando el admin ordena un giro
socket.on('ejecutar-giro', (data) => {
    console.log("¡Orden de giro recibida desde el servidor!");
    activarGiroFrenadoRealista(data.indiceGanador);
});

    // Función para enviar apuestas al servidor
    
    // ESTA ES LA FUNCIÓN QUE DEBES USAR
async function ejecutarApuestaServidor(ficha, monto) {
    // Validación local rápida
    if (parseFloat(datosUsuarioGlobales.saldo) < monto) {
        return alert("❌ Saldo insuficiente.");
    }

    try {
        const response = await fetch('/apostar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
            userId: usuarioActualId, 
            monto: Number(monto), 
            figura: figura 
        })
    });
        
        const data = await response.json();
        
        if (data.success) {
            // Solo si el servidor responde OK, actualizamos la interfaz
            apuestasRealizadas[ficha] = (apuestasRealizadas[ficha] || 0) + monto;
            document.getElementById(`btn-${ficha}`).classList.add('btn-activo');
            document.getElementById(`apuesta-${ficha}`).innerText = apuestasRealizadas[ficha] + " Bs";
        } else {
            alert("❌ Error: " + data.message);
        }
    } catch (error) {
        alert("❌ Error de conexión con el servidor.");
    }
}
        function cambiarPestanaAuth(modo) {
            modoActualAuth = modo;
            refrescarCaptcha();
            if(modo === "LOGIN") {
                document.getElementById('tab-login').style.background = "#1e293b"; document.getElementById('tab-login').style.color = "#fff";
                document.getElementById('tab-registro').style.background = "#020617"; document.getElementById('tab-registro').style.color = "#64748b";
                document.getElementById('campos-login').classList.remove('oculto');
                document.getElementById('campos-registro').classList.add('oculto');
            } else {
                document.getElementById('tab-registro').style.background = "#1e293b"; document.getElementById('tab-registro').style.color = "#fff";
                document.getElementById('tab-login').style.background = "#020617"; document.getElementById('tab-login').style.color = "#64748b";
                document.getElementById('campos-login').classList.add('oculto');
                document.getElementById('campos-registro').classList.remove('oculto');
            }
        }

        function procesarAutenticacion() {
            let respuestaUser = parseInt(document.getElementById('respuesta-captcha').value);
            if(respuestaUser !== captchaResultadoCorrecto) {
                alert("❌ Código de seguridad incorrecto. Intente de nuevo.");
                refrescarCaptcha();
                return;
            }

            if(modoActualAuth === "LOGIN") {
                let datoIngresado = document.getElementById('cod-ingreso').value.trim().toLowerCase();
                if(!datoIngresado) return alert("Ingrese su número de teléfono o código.");

                rtdb.ref('sistema/usuarios').once('value', (snapshot) => {
                    let idEncontrado = null;
                    snapshot.forEach((child) => {
                        let usuario = child.val();
                        // Compara el input con el ID (la key) o con el teléfono del usuario
                        if(child.key === datoIngresado || usuario.telefono === datoIngresado) {
                            idEncontrado = child.key;
                        }
                    });

                    if(idEncontrado) {
                        arrancarJuego(idEncontrado);
                    } else {
                        alert("El usuario o teléfono no existe.");
                    }

function enviarTransaccionBanca(tipo) {
    let inputMonto = document.getElementById('banca-monto');
    let monto = parseFloat(inputMonto.value);
    
    if (isNaN(monto) || monto < 50) return mostrarNotificacion("❌ Mínimo 50 Bs", "error");
    

    // 2. Validación específica para retiros
    if (tipo === 'RETIRAR' && monto > parseFloat(datosUsuarioGlobales.saldo)) {
        return mostrarNotificacion("❌ Saldo insuficiente", "error");
    }
    
    // 3. Crear objeto de solicitud
    let nuevaSolicitud = {
        usuarioId: usuarioActualId,
        nombre: datosUsuarioGlobales.nombre,
        cedula: datosUsuarioGlobales.cedula,
        telefono: datosUsuarioGlobales.telefono,
        monto: monto,
        tipo: tipo,
        referencia: document.getElementById('banca-ref') ? document.getElementById('banca-ref').value : "N/A",
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };

    // 4. Lógica de bloqueo de saldo (si es retiro, restamos de inmediato)
    if (tipo === 'RETIRAR') {
        rtdb.ref(`sistema/usuarios/${usuarioActualId}/saldo`).transaction(s => s - monto);
    }

    // 5. Guardar en Firebase
    rtdb.ref('sistema/solicitudesDeposito').push(nuevaSolicitud, (error) => {
        if (!error) {
            mostrarNotificacion("✅ Solicitud enviada.");
            cerrarModuloBanca();
        }
    });
} // <--- Cierre correcto de la función enviarTransaccionBanca

const canvas = document.getElementById('canvas-wheel'); 
const ctx = canvas ? canvas.getContext('2d') : null;

function generarGraficoRuleta(anguloBase) {
    if (!ctx) return;
    const totalGajos = elementosSorteo.length; 
    const arco = (Math.PI * 2) / totalGajos;
    ctx.clearRect(0, 0, 400, 400);
    for (let i = 0; i < totalGajos; i++) {
        let anguloGajo = anguloBase + (i * arco);
        ctx.fillStyle = coloresRuletaOriginal[i % coloresRuletaOriginal.length];
        ctx.beginPath(); 
        ctx.moveTo(200, 200);
        ctx.arc(200, 200, 190, anguloGajo, anguloGajo + arco);
        ctx.closePath(); 
        ctx.fill();
        ctx.save(); 
        ctx.translate(200, 200); 
        ctx.rotate(anguloGajo + (arco / 2));
        ctx.textAlign = "right"; 
        ctx.font = "bold 12px sans-serif";
        ctx.fillStyle = "#ffffff"; 
        ctx.fillText(elementosSorteo[i], 175, 4); 
        ctx.restore();
    }
    ctx.beginPath(); 
    ctx.arc(200, 200, 190, 0, Math.PI * 2); 
    ctx.strokeStyle = "#ffd700"; 
    ctx.lineWidth = 5; 
    ctx.stroke();
}

// Configuración de audio global
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    osc.start(); 
    osc.stop(audioCtx.currentTime + 0.05);
}

        function activarGiroFrenadoRealista(indiceObjetivo) {
    const totalGajos = elementosSorteo.length; 
    const arco = (Math.PI * 2) / totalGajos;
    let anguloDestino = (Math.PI * 3 / 2) - (indiceObjetivo * arco) - (arco / 2);
    let anguloFinal = anguloDestino + ((Math.PI * 2) * 6);
    let anguloActual = 0; let tiempoInicio = null; let duracion = 7000;
    
    document.getElementById('centro-popup').classList.remove('mostrar');
    document.getElementById('banner-estado-mesa').innerText = "🔊 ¡RUEDAN LOS TAMBORES!";

    function cuadroAnimacion(timestamp) {
        if (!tiempoInicio) tiempoInicio = timestamp;
        let transcurrido = timestamp - tiempoInicio;
        
        if (Math.floor(transcurrido / 150) % 2 === 0) playTick();

        if (transcurrido < duracion) {
            anguloActual = ((transcurrido/duracion - 1) ** 3 + 1) * anguloFinal;
            generarGraficoRuleta(anguloActual);
            requestAnimationFrame(cuadroAnimacion);
        } else {
            generarGraficoRuleta(anguloFinal);
            let ganador = elementosSorteo[indiceObjetivo];
            
            // 1. Guardar Historial
            rtdb.ref('sistema/historial').push({
                resultado: ganador,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // 2. Actualizar Popup Central
            const elementoNombre = document.getElementById('centro-nombre');
            if (elementoNombre) elementoNombre.innerText = "¡Salió: " + ganador + "!";
            
            let poteActual = parseFloat(document.getElementById('pote-dinamico').innerText.replace(/,/g, '')) || 0;

            // --- AQUÍ ESTÁ EL CAMBIO CRÍTICO ---
            // Consultamos Firebase directamente para obtener el monto real apostado a esta figura
            rtdb.ref(`sistema/apuestas_por_figura/${ganador}`).once('value').then((snap) => {
                let montoApostado = snap.val() || 0;
                
                if (montoApostado > 0) {
                    let premioApuesta = montoApostado * 30; // Ajusta este multiplicador si es necesario
                    let totalAEntregar = premioApuesta + (poteActual * 0.80); 
                    
                    document.getElementById('centro-operacion').innerText = "¡FELICIDADES!";
                    document.getElementById('centro-ganancia').innerText = "Ganaste " + totalAEntregar.toFixed(2) + " Bs";
                    
                    // Actualizar saldo solo si el usuario actual es el ganador (Lógica pendiente de tu sistema)
                    rtdb.ref(`sistema/usuarios/${usuarioActualId}/saldo`).transaction(s => (s || 0) + totalAEntregar);
                    rtdb.ref('sistema/global/poteMesa').set(0);
                } else {
                    document.getElementById('centro-operacion').innerText = "NADIE APOSTÓ";
                    document.getElementById('centro-ganancia').innerText = "¡PREMIO SE ACUMULA!";
                }
                
                // Mostrar el popup una vez que ya consultamos los datos
                document.getElementById('centro-popup').classList.add('mostrar');
            });
            
            document.getElementById('centro-popup').classList.add('mostrar');

            // 3. Actualizar Historial Visual
            let lista = document.getElementById('historial-salidas');
            let nuevoItem = document.createElement('div');
            nuevoItem.className = 'historial-item';
            nuevoItem.innerText = ganador;
            lista.prepend(nuevoItem);
            if(lista.children.length > 3) lista.removeChild(lista.lastChild);

            // 4. Limpieza post-juego
            setTimeout(() => {
                apuestasRealizadas = {};
                document.getElementById('centro-popup').classList.remove('mostrar');
                elementosSorteo.forEach(item => {
                let btn = document.getElementById(`btn-${item}`);
                if(btn) btn.classList.remove('btn-activo');
                let displayApuesta = document.getElementById(`apuesta-${item}`);
                if(displayApuesta) displayApuesta.innerText = "0 Bs";
    });
            }, 5000);
        }
    }
    requestAnimationFrame(cuadroAnimacion);
}

async function realizarApuestaDefinitiva(figura) {
    const btnActivo = document.querySelector('.ficha-activa');
    if (!btnActivo) return alert("⚠️ Selecciona una ficha.");
    
    // Obtenemos el valor de la ficha (extraemos el número del texto del botón)
    const monto = parseInt(btnActivo.innerText);
    
    // --- 1. ACCIÓN INMEDIATA (CERO LATENCIA) ---
    const btnFigura = document.getElementById(`btn-${figura}`);
    const displayElement = document.getElementById(`apuesta-${figura}`);
    
    // Guardamos estado anterior por si hay que revertir
    const totalAnterior = parseInt(displayElement.innerText) || 0;
    
    // Marcado visual instantáneo
    btnFigura.classList.add('btn-activo');
    displayElement.innerText = (totalAnterior + monto) + " Bs";

    // --- 2. COMUNICACIÓN EN SEGUNDO PLANO ---
    try {
        const response = await fetch('/realizar-apuesta', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: usuarioActualId, monto: monto, figura: figura })
        });

        if (!response.ok) {
            // Si el servidor responde con error (ej. 400 Bad Request), revertimos
            throw new Error("Saldo insuficiente o error de servidor");
        }
        // Si todo sale bien, no hacemos nada más, la interfaz ya está marcada.
    } catch (error) {
        console.error("Error en apuesta:", error);
        // Revertir visualmente si algo falló
        btnFigura.classList.remove('btn-activo');
        displayElement.innerText = totalAnterior + " Bs";
        alert("❌ Error: " + error.message);
    }
}
